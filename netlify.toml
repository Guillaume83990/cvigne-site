[build]
  publish = "."

# ── Redirection ancien domaine → nouveau (301 permanent) ──
[[redirects]]
  from   = "https://cvigne-site.netlify.app/*"
  to     = "https://cvigne.netlify.app/:splat"
  status = 301
  force  = true

# ── Page 404 personnalisée ─────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# ── Admin CMS ─────────────────────────────────────────────
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

[[redirects]]
  from   = "/api/histoires"
  to     = "/content/histoires.json"
  status = 200

# ── En-têtes de sécurité ──────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-XSS-Protection         = "1; mode=block"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"

# ── Cache polices locales (1 an) ──────────────────────────
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache images (1 mois) ────────────────────────────────
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"